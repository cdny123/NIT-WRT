name: Build OpenWrt

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup
      run: |
        sudo apt-get install -y build-essential libssl-dev python3
        
    - name: Apply configs
      run: |
        cp config/base.conf .config
        cat config/plugins.conf >> .config
        cat config/theme.conf >> .config
        git apply patches/*.patch
        
    - name: Build
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        make -j$(nproc) download
        make -j$(nproc)
        
    - uses: actions/upload-artifact@v4
      with:
        name: firmware
        path: bin/targets/x86/64/*.img.gz
